services:
  - type: web
    name: opportu-net-api
    runtime: node
    repo: https://github.com/lakshithagowda576-pixel/OpportuNet
    rootDir: artifacts/api-server
    buildCommand: pnpm install && node ./build.mjs
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3008
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OAUTH_CALLBACK_BASE_URL
        sync: false

  - type: static site
    name: opportu-net-frontend
    runtime: node
    repo: https://github.com/lakshithagowda576-pixel/OpportuNet
    rootDir: OpportuNet/artifacts/job-portal
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
