services:
  - type: web
    name: opportu-net-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add your environment variables here
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_KEY
        sync: false

  - type: web
    name: opportu-net-frontend
    runtime: static
    buildCommand: cd OpportuNet/artifacts/job-portal && npm install && npm run build
    staticPublishPath: ./dist/public
    envVars:
      - key: NODE_ENV
        value: production
      # Add frontend environment variables here
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
