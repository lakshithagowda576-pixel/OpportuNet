services:
  - type: static site
    name: opportu-net-frontend
    runtime: node
    repo: https://github.com/lakshithagowda576-pixel/OpportuNet
    rootDir: OpportuNet/artifacts/job-portal
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false